# ====================================
# IoT Link RTU Common Configuration
# ====================================

# ------------------------------------
# HTTP Server Configuration
# ------------------------------------
http.server.port=8080
http.server.host=localhost

# ------------------------------------
# MQTT Configuration (Optional)
# ------------------------------------
mqtt.broker.url=tcp://localhost:1883
mqtt.client.id.prefix=iot-link
mqtt.username=
mqtt.password=

# ------------------------------------
# Database Configuration (Optional)
# ------------------------------------
db.url=jdbc:mysql://localhost:3306/iot_link?useSSL=false&serverTimezone=UTC&characterEncoding=utf8
db.username=root
db.password=root
db.driver=com.mysql.cj.jdbc.Driver

# ------------------------------------
# Log Configuration
# ------------------------------------
log.level=DEBUG
log.path=./logs

# ------------------------------------
# Common Application Settings
# ------------------------------------
app.name=IoT Link RTU
app.version=1.0.0
app.env=dev
