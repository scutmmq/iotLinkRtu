# RTU Gateway Server 配置文件

# ========================================
# 服务器配置
# ========================================
# RTU 网关监听端口
rtu.port=8888

# ========================================
# MQTT 配置
# ========================================
# MQTT Broker 地址
mqtt.broker.url=tcp://localhost:1883

# MQTT 客户端 ID 前缀
mqtt.client.id.prefix=rtu-gateway

# MQTT 用户名（如果需要）
# mqtt.username=rtu_gateway
# mqtt.password=your_password

# ========================================
# Web Server API 配置
# ========================================
# Web Server API 地址（用于 RTU 认证验证）
web.server.api.url=http://localhost:8080
